<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Star</title>
  <meta property="og:title" content="My Star — Sana bir yıldız geldi" />
  <meta property="og:description" content="Bir not, bir gülümseme, bir hatırlama… Belki de aklımdasın demenin en zarif yolu." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07071a; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px;
    }
    .lang-switch { position: fixed; top: 20px; right: 20px; display: flex; gap: 8px; }
    .lang-btn { background: none; border: 1px solid #1e1e4a; color: #3a4a6a; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .lang-btn.active { border-color: #c9a96e; color: #c9a96e; }
    .star { font-size: 56px; margin-bottom: 14px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    .app-name { color: #c9a96e; font-size: 26px; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 10px; }
    .tagline { color: #6b8aad; font-size: 14px; margin-bottom: 12px; text-align: center; max-width: 320px; line-height: 1.7; }
    .desc { color: #3a4a6a; font-size: 13px; text-align: center; max-width: 300px; line-height: 1.8; margin-bottom: 36px; }
    .divider { width: 32px; height: 1px; background: rgba(201,169,110,0.3); margin: 0 auto 20px; }
    .card { background: #0d0d24; border: 1px solid #c9a96e; border-radius: 24px; padding: 28px 24px; width: 100%; max-width: 360px; text-align: center; margin-bottom: 20px; }
    .gift-icon { font-size: 32px; margin-bottom: 10px; }
    .star-name { color: #c9a96e; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .dedication { color: rgba(200,180,255,0.7); font-size: 13px; margin-bottom: 10px; }
    .note { color: #6b8aad; font-size: 13px; font-style: italic; line-height: 1.6; padding: 10px 14px; background: #13132e; border-radius: 10px; margin-top: 8px; }

    /* Yön kartı */
    .direction-card { background: #0d0d24; border: 1px solid rgba(201,169,110,0.3); border-radius: 20px; padding: 24px; width: 100%; max-width: 360px; text-align: center; margin-bottom: 20px; }
    .direction-title { color: #6b8aad; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
    .compass-wrap { position: relative; width: 100px; height: 100px; margin: 0 auto 16px; }
    .compass-ring { width: 100px; height: 100px; border-radius: 50%; border: 1px solid rgba(201,169,110,0.25); position: absolute; top: 0; left: 0; }
    .compass-ring-inner { width: 70px; height: 70px; border-radius: 50%; border: 1px solid rgba(201,169,110,0.15); position: absolute; top: 15px; left: 15px; }
    .compass-dot { width: 8px; height: 8px; border-radius: 50%; background: #c9a96e; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .compass-arrow { position: absolute; top: 50%; left: 50%; width: 3px; background: #c9a96e; border-radius: 2px; transform-origin: bottom center; }
    .direction-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 8px; }
    .direction-item { text-align: center; }
    .direction-label { color: #3a4a6a; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .direction-value { color: #c9a96e; font-size: 18px; font-weight: 800; }
    .direction-hint { color: #2a3a5a; font-size: 11px; margin-top: 14px; line-height: 1.6; }
    .direction-hint a { color: #c9a96e; text-decoration: none; }

    .btn { display: block; width: 100%; max-width: 360px; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; text-decoration: none; text-align: center; cursor: pointer; border: none; margin-bottom: 10px; }
    .btn-primary { background: #c9a96e; color: #07071a; }
    .btn-secondary { background: #13132e; color: #c9a96e; border: 1px solid #c9a96e; }
    #status { color: #4a6a8a; font-size: 12px; margin-bottom: 14px; text-align: center; min-height: 18px; }
    .footer { color: #1e2d3d; font-size: 11px; margin-top: 36px; text-align: center; }
    .footer a { color: #3a4a6a; text-decoration: none; }
  </style>
</head>
<body>

  <div class="lang-switch">
    <button class="lang-btn" id="btn-tr" onclick="setLang('tr')">TR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="star">&#10022;</div>
  <div class="app-name">My Star</div>
  <div class="tagline" id="tagline"></div>
  <div class="divider"></div>
  <div class="desc" id="desc"></div>

  <div class="card" id="starCard" style="display:none">
    <div class="gift-icon">&#127873;</div>
    <div class="star-name" id="starName"></div>
    <div class="dedication" id="dedication"></div>
    <div class="note" id="note" style="display:none"></div>
  </div>

  <!-- Yon gosterge karti -->
  <div class="direction-card" id="directionCard" style="display:none">
    <div class="direction-title" id="directionTitle"></div>
    <div class="compass-wrap">
      <div class="compass-ring"></div>
      <div class="compass-ring-inner"></div>
      <div class="compass-dot"></div>
      <div class="compass-arrow" id="compassArrow"></div>
    </div>
    <div class="direction-row">
      <div class="direction-item">
        <div class="direction-label" id="horizLabel"></div>
        <div class="direction-value" id="horizValue"></div>
      </div>
      <div style="width:1px;background:rgba(201,169,110,0.15);margin:4px 0"></div>
      <div class="direction-item">
        <div class="direction-label" id="vertLabel"></div>
        <div class="direction-value" id="vertValue"></div>
      </div>
    </div>
    <div class="direction-hint" id="directionHint"></div>
  </div>

  <div id="status"></div>

  <button class="btn btn-primary" id="openBtn" style="display:none" onclick="openInApp()"></button>
  <a class="btn btn-secondary" id="downloadBtn" href="https://apps.apple.com/app/id000000000" style="display:none"></a>

  <div class="footer">
    <a href="https://getmystar.app/privacy" id="privacyLink"></a> &middot; <a href="https://getmystar.app/terms" id="termsLink"></a> &middot; getmystar.app &middot; 2026
  </div>

  <script>
    const strings = {
      tr: {
        tagline: 'Sevdiklerinle bag kurmanin en guzel yolu.',
        desc: 'Bir not, bir gulumse, bir hatırlama...\nBelki de "aklimdaKsin" demenin en zarif yolu.',
        openBtn: 'Uygulamada Ac',
        downloadBtn: "App Store'dan Indir",
        privacy: 'Gizlilik Politikasi',
        terms: 'Kullanim Kosullari',
        opening: 'Uygulama aciliyor...',
        notFound: 'Uygulama bulunamadi.',
        retry: 'Tekrar Dene',
        opened: 'Uygulama acildi!',
        directionTitle: 'YILDIZIN YONU',
        horizLabel: 'YATAY',
        vertLabel: 'DIKEY',
        directionHint: 'Telefonu bu yone cevir ve gokyuzune bak. Tam AR deneyimi icin <a href="https://apps.apple.com/app/id000000000">GetMyStar</a> uygulamasini indir.',
      },
      en: {
        tagline: 'The most beautiful way to connect with the ones you love.',
        desc: 'A note, a smile, a memory...\nPerhaps the most elegant way to say "I\'m thinking of you."',
        openBtn: 'Open in App',
        downloadBtn: 'Download on App Store',
        privacy: 'Privacy Policy',
        terms: 'Terms of Use',
        opening: 'Opening app...',
        notFound: 'App not found.',
        retry: 'Try Again',
        opened: 'App opened!',
        directionTitle: 'YOUR STAR\'S DIRECTION',
        horizLabel: 'HORIZONTAL',
        vertLabel: 'VERTICAL',
        directionHint: 'Point your phone in this direction and look at the sky. For the full AR experience, download <a href="https://apps.apple.com/app/id000000000">GetMyStar</a>.',
      }
    };

    let currentLang = 'tr';
    let appOpened = false;

    const params = new URLSearchParams(window.location.search);
    const name = decodeURIComponent(params.get('name') || '');
    const az = parseFloat(params.get('az') || '0');
    const alt = parseFloat(params.get('alt') || '0');
    const ded = decodeURIComponent(params.get('ded') || '');
    const note = decodeURIComponent(params.get('note') || '');
    const ra = params.get('ra') || '';
    const dec = params.get('dec') || '';

    const deepLink = 'mystar://find?name=' + encodeURIComponent(name) +
      '&az=' + az + '&alt=' + alt +
      '&ded=' + encodeURIComponent(ded) +
      '&note=' + encodeURIComponent(note) +
      '&ra=' + ra + '&dec=' + dec;

    function getCardinalDirection(az, lang) {
      const dirs_tr = ['Kuzey', 'Kuzeydogu', 'Dogu', 'Guneydogu', 'Guney', 'Guneybati', 'Bati', 'Kuzeybati'];
      const dirs_en = ['North', 'Northeast', 'East', 'Southeast', 'South', 'Southwest', 'West', 'Northwest'];
      const dirs = lang === 'tr' ? dirs_tr : dirs_en;
      return dirs[Math.round(az / 45) % 8];
    }

    function updateDirection(lang) {
      if (!name) return;
      const s = strings[lang];
      document.getElementById('directionTitle').textContent = s.directionTitle;
      document.getElementById('horizLabel').textContent = s.horizLabel;
      document.getElementById('vertLabel').textContent = s.vertLabel;
      document.getElementById('directionHint').innerHTML = s.directionHint;

      // Pusula oku - azimuth'a gore don
      const arrow = document.getElementById('compassArrow');
      const arrowLen = 34;
      const cx = 50, cy = 50;
      const rad = (az - 90) * Math.PI / 180;
      const endX = cx + Math.cos(rad) * arrowLen;
      const endY = cy + Math.sin(rad) * arrowLen;
      const startX = cx - Math.cos(rad) * 12;
      const startY = cy - Math.sin(rad) * 12;
      const angle = az;
      arrow.style.cssText = `
        position: absolute;
        top: 50%; left: 50%;
        width: 3px;
        height: ${arrowLen}px;
        background: #c9a96e;
        border-radius: 2px;
        transform-origin: bottom center;
        transform: translate(-50%, -100%) rotate(${angle}deg);
        margin-top: 0;
      `;

      // Yatay yon
      const cardinal = getCardinalDirection(az, lang);
      document.getElementById('horizValue').textContent = cardinal + '  ' + Math.round(az) + 'deg';

      // Dikey yon
      const altRounded = Math.round(alt);
      let vertText = '';
      if (lang === 'tr') {
        vertText = altRounded >= 0 ? altRounded + 'deg yukari' : Math.abs(altRounded) + 'deg asagi';
      } else {
        vertText = altRounded >= 0 ? altRounded + 'deg up' : Math.abs(altRounded) + 'deg down';
      }
      document.getElementById('vertValue').textContent = vertText;
    }

    function setLang(lang) {
      currentLang = lang;
      const s = strings[lang];
      document.getElementById('tagline').textContent = s.tagline;
      document.getElementById('desc').innerHTML = s.desc.replace('\n', '<br>');
      document.getElementById('privacyLink').textContent = s.privacy;
      document.getElementById('termsLink').textContent = s.terms;
      document.getElementById('btn-tr').className = 'lang-btn' + (lang === 'tr' ? ' active' : '');
      document.getElementById('btn-en').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
      const openBtn = document.getElementById('openBtn');
      const dlBtn = document.getElementById('downloadBtn');
      if (openBtn) openBtn.textContent = s.openBtn;
      if (dlBtn) dlBtn.textContent = s.downloadBtn;
      document.documentElement.lang = lang;
      localStorage.setItem('mystar_lang', lang);
      updateDirection(lang);
    }

    function openInApp() {
      const s = strings[currentLang];
      document.getElementById('status').textContent = s.opening;
      window.location.href = deepLink;
      setTimeout(() => {
        if (!appOpened) {
          document.getElementById('status').textContent = s.notFound;
          document.getElementById('downloadBtn').style.display = 'block';
          document.getElementById('openBtn').textContent = s.retry;
        }
      }, 2500);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        appOpened = true;
        document.getElementById('status').textContent = strings[currentLang].opened;
      }
    });

    const savedLang = localStorage.getItem('mystar_lang');
    const browserLang = navigator.language ? navigator.language.substring(0, 2) : 'en';
    const initLang = savedLang || (browserLang === 'tr' ? 'tr' : 'en');
    setLang(initLang);

    if (name) {
      document.getElementById('desc').style.display = 'none';
      document.getElementById('starCard').style.display = 'block';
      document.getElementById('directionCard').style.display = 'block';
      document.getElementById('starName').textContent = name;
      document.getElementById('openBtn').style.display = 'block';
      if (ded) document.getElementById('dedication').textContent = name + ' - ' + ded;
      if (note) {
        const el = document.getElementById('note');
        el.textContent = '"' + note + '"';
        el.style.display = 'block';
      }
      setTimeout(openInApp, 700);
    }
  </script>
</body>
</html>
