<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GetMyStar</title>
  <meta property="og:title" content="GetMyStar — Sana bir yıldız geldi" />
  <meta property="og:description" content="Bir not, bir gülümseme, bir hatırlama… Belki de aklımdasın demenin en zarif yolu." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060d2e; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 24px;
    }
    .lang-switch { position: fixed; top: 20px; right: 20px; display: flex; gap: 8px; }
    .lang-btn { background: none; border: 1px solid #243366; color: #5a6aaa; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; }
    .lang-btn.active { border-color: #e8c478; color: #e8c478; }
    .star { font-size: 56px; margin-bottom: 14px; animation: pulse 2s infinite; color: #ffe9b8; text-shadow: 0 0 20px #e8c478; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    .app-name { color: #e8c478; font-size: 26px; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 10px; }
    .tagline { color: #8aa0d8; font-size: 14px; margin-bottom: 12px; text-align: center; max-width: 320px; line-height: 1.7; }
    .desc { color: #5a6aaa; font-size: 13px; text-align: center; max-width: 300px; line-height: 1.8; margin-bottom: 36px; }
    .divider { width: 32px; height: 1px; background: rgba(232,196,120,0.3); margin: 0 auto 20px; }
    .card { background: #0f1838; border: 1px solid #e8c478; border-radius: 24px; padding: 28px 24px; width: 100%; max-width: 360px; text-align: center; margin-bottom: 20px; }
    .gift-icon { font-size: 32px; margin-bottom: 10px; }
    .star-name { color: #e8c478; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .dedication { color: rgba(200,180,255,0.7); font-size: 13px; margin-bottom: 10px; }
    .note { color: #8aa0d8; font-size: 13px; font-style: italic; line-height: 1.6; padding: 10px 14px; background: #0a1230; border-radius: 10px; margin-top: 8px; }
    .btn { display: block; width: 100%; max-width: 360px; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; text-decoration: none; text-align: center; cursor: pointer; border: none; margin-bottom: 10px; }
    .btn-primary { background: #e8c478; color: #060d2e; }
    .btn-secondary { background: #0a1230; color: #e8c478; border: 1px solid #e8c478; }
    #status { color: #7a8ac8; font-size: 12px; margin-bottom: 14px; text-align: center; min-height: 18px; }

    /* Yon karti */
    .direction-card { background: #0f1838; border: 1px solid rgba(232,196,120,0.2); border-radius: 20px; padding: 24px; width: 100%; max-width: 360px; text-align: center; margin-top: 8px; margin-bottom: 20px; }
    .direction-title { color: #5a6aaa; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
    .compass-wrap { position: relative; width: 90px; height: 90px; margin: 0 auto 16px; }
    .compass-ring { width: 90px; height: 90px; border-radius: 50%; border: 1px solid rgba(232,196,120,0.2); position: absolute; top: 0; left: 0; }
    .compass-ring-inner { width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(232,196,120,0.12); position: absolute; top: 15px; left: 15px; }
    .compass-dot { width: 6px; height: 6px; border-radius: 50%; background: #e8c478; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .direction-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 8px; }
    .direction-item { text-align: center; }
    .direction-label { color: #5a6aaa; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .direction-value { color: #e8c478; font-size: 15px; font-weight: 800; }
    .direction-hint { color: #5a6aaa; font-size: 11px; margin-top: 14px; line-height: 1.6; }
    .direction-hint a { color: #7a8ac8; text-decoration: none; }

    .footer { color: #243366; font-size: 11px; margin-top: 36px; text-align: center; }
    .footer a { color: #5a6aaa; text-decoration: none; }
  </style>
</head>
<body>

  <div class="lang-switch">
    <button class="lang-btn" id="btn-tr" onclick="setLang('tr')">TR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>

  <div class="star">&#10022;</div>
  <div class="app-name">GetMyStar</div>
  <div class="tagline" id="tagline"></div>
  <div class="divider"></div>
  <div class="desc" id="desc"></div>

  <!-- 1. Yildiz karti -->
  <div class="card" id="starCard" style="display:none">
    <div class="gift-icon">&#127873;</div>
    <div class="star-name" id="starName"></div>
    <div class="dedication" id="dedication"></div>
    <div class="note" id="note" style="display:none"></div>
  </div>

  <!-- 2. Butonlar - on planda -->
  <div id="status"></div>
  <button class="btn btn-primary" id="openBtn" style="display:none" onclick="openInApp()"></button>
  <a class="btn btn-secondary" id="downloadBtn" href="https://apps.apple.com/app/id000000000" style="display:none"></a>

  <!-- 3. Yon karti - asagida, merak uyandiran ek bilgi -->
  <div class="direction-card" id="directionCard" style="display:none">
    <div class="direction-title" id="directionTitle"></div>
    <div class="compass-wrap">
      <div class="compass-ring"></div>
      <div class="compass-ring-inner"></div>
      <div class="compass-dot"></div>
      <div id="compassArrow" style="position:absolute;top:50%;left:50%;width:3px;background:#e8c478;border-radius:2px;transform-origin:bottom center;"></div>
    </div>
    <div class="direction-row">
      <div class="direction-item">
        <div class="direction-label" id="horizLabel"></div>
        <div class="direction-value" id="horizValue"></div>
      </div>
      <div style="width:1px;background:rgba(232,196,120,0.12);margin:4px 0"></div>
      <div class="direction-item">
        <div class="direction-label" id="vertLabel"></div>
        <div class="direction-value" id="vertValue"></div>
      </div>
    </div>
    <div class="direction-hint" id="directionHint"></div>
  </div>

  <div class="footer">
    <a href="https://getmystar.app/privacy" id="privacyLink"></a> &middot; <a href="https://getmystar.app/terms" id="termsLink"></a> &middot; getmystar.app &middot; 2026
  </div>

  <script>
    const strings = {
      tr: {
        tagline: 'Sevdiklerinle bag kurmanin en guzel yolu.',
        desc: 'Bir not, bir gulumse, bir hatırlama...\nBelki de "aklimdasin" demenin en zarif yolu.',
        openBtn: 'Uygulamada Ac',
        downloadBtn: "App Store'dan Indir",
        privacy: 'Gizlilik Politikasi',
        terms: 'Kullanim Kosullari',
        opening: 'Uygulama aciliyor...',
        notFound: 'Uygulama bulunamadi.',
        retry: 'Tekrar Dene',
        opened: 'Uygulama acildi!',
        directionTitle: 'YILDIZIN YONU',
        horizLabel: 'YATAY',
        vertLabel: 'DIKEY',
        directionHint: 'Telefonu bu yone cevir ve gokyuzune bak.<br>Tam deneyim icin GetMyStar uygulamasini indir.',
        cardinalDirs: ['Kuzey','Kuzeydogu','Dogu','Guneydogu','Guney','Guneybati','Bati','Kuzeybati'],
        up: 'yukari',
        down: 'asagi',
      },
      en: {
        tagline: 'The most beautiful way to connect with the ones you love.',
        desc: 'A note, a smile, a memory...\nPerhaps the most elegant way to say "I\'m thinking of you."',
        openBtn: 'Open in App',
        downloadBtn: 'Download on App Store',
        privacy: 'Privacy Policy',
        terms: 'Terms of Use',
        opening: 'Opening app...',
        notFound: 'App not found.',
        retry: 'Try Again',
        opened: 'App opened!',
        directionTitle: 'YOUR STAR\'S DIRECTION',
        horizLabel: 'HORIZONTAL',
        vertLabel: 'VERTICAL',
        directionHint: 'Point your phone this way and look at the sky.<br>Download GetMyStar for the full experience.',
        cardinalDirs: ['North','Northeast','East','Southeast','South','Southwest','West','Northwest'],
        up: 'up',
        down: 'down',
      }
    };

    let currentLang = 'tr';
    let appOpened = false;

    const params = new URLSearchParams(window.location.search);
    const name = decodeURIComponent(params.get('name') || '');
    const az = parseFloat(params.get('az') || '0');
    const alt = parseFloat(params.get('alt') || '0');
    const ded = decodeURIComponent(params.get('ded') || '');
    const noteVal = decodeURIComponent(params.get('note') || '');
    const ra = params.get('ra') || '';
    const dec = params.get('dec') || '';

    const deepLink = 'mystar://find?name=' + encodeURIComponent(name) +
      '&az=' + az + '&alt=' + alt +
      '&ded=' + encodeURIComponent(ded) +
      '&note=' + encodeURIComponent(noteVal) +
      '&ra=' + ra + '&dec=' + dec;

    function updateDirection(lang) {
      if (!name) return;
      const s = strings[lang];
      document.getElementById('directionTitle').textContent = s.directionTitle;
      document.getElementById('horizLabel').textContent = s.horizLabel;
      document.getElementById('vertLabel').textContent = s.vertLabel;
      document.getElementById('directionHint').innerHTML = s.directionHint;

      // Pusula oku
      const arrowLen = 30;
      const arrow = document.getElementById('compassArrow');
      arrow.style.height = arrowLen + 'px';
      arrow.style.transform = 'translate(-50%, -100%) rotate(' + az + 'deg)';

      // Yatay
      const cardinal = s.cardinalDirs[Math.round(az / 45) % 8];
      document.getElementById('horizValue').textContent = cardinal + ' ' + Math.round(az) + 'deg';

      // Dikey
      const altR = Math.round(alt);
      document.getElementById('vertValue').textContent = altR >= 0
        ? altR + 'deg ' + s.up
        : Math.abs(altR) + 'deg ' + s.down;
    }

    function setLang(lang) {
      currentLang = lang;
      const s = strings[lang];
      document.getElementById('tagline').textContent = s.tagline;
      document.getElementById('desc').innerHTML = s.desc.replace('\n', '<br>');
      document.getElementById('privacyLink').textContent = s.privacy;
      document.getElementById('termsLink').textContent = s.terms;
      document.getElementById('btn-tr').className = 'lang-btn' + (lang === 'tr' ? ' active' : '');
      document.getElementById('btn-en').className = 'lang-btn' + (lang === 'en' ? ' active' : '');
      const openBtn = document.getElementById('openBtn');
      const dlBtn = document.getElementById('downloadBtn');
      if (openBtn) openBtn.textContent = s.openBtn;
      if (dlBtn) dlBtn.textContent = s.downloadBtn;
      document.documentElement.lang = lang;
      localStorage.setItem('mystar_lang', lang);
      updateDirection(lang);
    }

    function openInApp() {
      const s = strings[currentLang];
      document.getElementById('status').textContent = s.opening;
      window.location.href = deepLink;
      setTimeout(() => {
        if (!appOpened) {
          document.getElementById('status').textContent = s.notFound;
          document.getElementById('downloadBtn').style.display = 'block';
          document.getElementById('openBtn').textContent = s.retry;
        }
      }, 2500);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        appOpened = true;
        document.getElementById('status').textContent = strings[currentLang].opened;
      }
    });

    const savedLang = localStorage.getItem('mystar_lang');
    const browserLang = navigator.language ? navigator.language.substring(0, 2) : 'en';
    const initLang = savedLang || (browserLang === 'tr' ? 'tr' : 'en');
    setLang(initLang);

    if (name) {
      document.getElementById('desc').style.display = 'none';
      document.getElementById('starCard').style.display = 'block';
      document.getElementById('directionCard').style.display = 'block';
      document.getElementById('starName').textContent = name;
      document.getElementById('openBtn').style.display = 'block';
      if (ded) document.getElementById('dedication').textContent = ded;
      if (noteVal) {
        const el = document.getElementById('note');
        el.textContent = '"' + noteVal + '"';
        el.style.display = 'block';
      }
      setTimeout(openInApp, 700);
    }
  </script>
</body>
</html>
