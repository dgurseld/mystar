<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Star — Gökyüzündeki Bağ</title>
  <meta property="og:title" content="My Star — Sana bir yıldız geldi" />
  <meta property="og:description" content="Bir not, bir gülümseme, bir hatırlama… Belki de aklımdasın demenin en zarif yolu." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07071a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .star { font-size: 56px; margin-bottom: 14px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .app-name { color: #c9a96e; font-size: 26px; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 10px; }
    .tagline { color: #6b8aad; font-size: 14px; margin-bottom: 12px; text-align: center; max-width: 320px; line-height: 1.7; }
    .desc { color: #3a4a6a; font-size: 13px; text-align: center; max-width: 300px; line-height: 1.8; margin-bottom: 36px; }
    .divider { width: 32px; height: 1px; background: rgba(201,169,110,0.3); margin: 0 auto 20px; }
    .card {
      background: #0d0d24; border: 1px solid #c9a96e;
      border-radius: 24px; padding: 28px 24px;
      width: 100%; max-width: 360px; text-align: center; margin-bottom: 20px;
    }
    .gift-icon { font-size: 32px; margin-bottom: 10px; }
    .star-name { color: #c9a96e; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .dedication { color: rgba(200,180,255,0.7); font-size: 13px; margin-bottom: 10px; }
    .note { color: #6b8aad; font-size: 13px; font-style: italic; line-height: 1.6; padding: 10px 14px; background: #13132e; border-radius: 10px; margin-top: 8px; }
    .btn { display: block; width: 100%; max-width: 360px; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; text-decoration: none; text-align: center; cursor: pointer; border: none; margin-bottom: 10px; }
    .btn-primary { background: #c9a96e; color: #07071a; }
    .btn-secondary { background: #13132e; color: #c9a96e; border: 1px solid #c9a96e; }
    #status { color: #4a6a8a; font-size: 12px; margin-bottom: 14px; text-align: center; min-height: 18px; }
    .footer { color: #1e2d3d; font-size: 11px; margin-top: 36px; text-align: center; }
    .footer a { color: #3a4a6a; text-decoration: none; }
    .no-star { display: none; }
  </style>
</head>
<body>
  <div class="star">✦</div>
  <div class="app-name">My Star</div>
  <div class="tagline">Sevdiklerinle bağ kurmanın en güzel yolu.</div>
  <div class="divider"></div>
  <div class="desc" id="homeDesc">Bir not, bir gülümseme, bir hatırlama…<br>Belki de "aklımdasın" demenin en zarif yolu.</div>

  <div class="card" id="starCard" style="display:none">
    <div class="gift-icon">🎁</div>
    <div class="star-name" id="starName"></div>
    <div class="dedication" id="dedication"></div>
    <div class="note" id="note" style="display:none"></div>
  </div>

  <div id="status"></div>

  <button class="btn btn-primary" id="openBtn" style="display:none" onclick="openInApp()">
    Uygulamada Aç ✦
  </button>
  <a class="btn btn-secondary" id="downloadBtn"
    href="https://apps.apple.com/app/id000000000"
    style="display:none">
    App Store'dan İndir
  </a>

  <div class="footer">
    <a href="https://getmystar.app/privacy">Gizlilik Politikası</a> · getmystar.app · 2026
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = decodeURIComponent(params.get('name') || '');
    const az = params.get('az') || '0';
    const alt = params.get('alt') || '0';
    const ded = decodeURIComponent(params.get('ded') || '');
    const note = decodeURIComponent(params.get('note') || '');
    const ra = params.get('ra') || '';
    const dec = params.get('dec') || '';

    if (name) {
      document.getElementById('homeDesc').style.display = 'none';
      document.getElementById('starCard').style.display = 'block';
      document.getElementById('starName').textContent = name;
      document.getElementById('openBtn').style.display = 'block';
      if (ded) document.getElementById('dedication').textContent = '💫 ' + ded;
      if (note) {
        const el = document.getElementById('note');
        el.textContent = '"' + note + '"';
        el.style.display = 'block';
      }
    }

    const deepLink = 'mystar://find?name=' + encodeURIComponent(name) +
      '&az=' + az + '&alt=' + alt +
      '&ded=' + encodeURIComponent(ded) +
      '&note=' + encodeURIComponent(note) +
      '&ra=' + ra + '&dec=' + dec;

    let appOpened = false;

    function openInApp() {
      document.getElementById('status').textContent = 'Uygulama açılıyor...';
      window.location.href = deepLink;
      setTimeout(() => {
        if (!appOpened) {
          document.getElementById('status').textContent = 'Uygulama bulunamadı:';
          document.getElementById('downloadBtn').style.display = 'block';
          document.getElementById('openBtn').textContent = 'Tekrar Dene ✦';
        }
      }, 2500);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        appOpened = true;
        document.getElementById('status').textContent = '✦ Uygulama açıldı!';
      }
    });

    if (name) setTimeout(openInApp, 700);
  </script>
</body>
</html>
