<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Star — Bir Yıldız Seni Bekliyor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07071a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .star { font-size: 64px; margin-bottom: 16px; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .app-name {
      color: #c9a96e;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .tagline {
      color: #3a4a6a;
      font-size: 14px;
      margin-bottom: 40px;
      text-align: center;
    }
    .card {
      background: #0d0d24;
      border: 1px solid #1e1e4a;
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      margin-bottom: 20px;
    }
    .gift-icon { font-size: 36px; margin-bottom: 12px; }
    .star-name {
      color: #c9a96e;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .dedication {
      color: rgba(200, 180, 255, 0.7);
      font-size: 14px;
      margin-bottom: 12px;
    }
    .note {
      color: #6b8aad;
      font-size: 14px;
      font-style: italic;
      line-height: 1.6;
      padding: 12px 16px;
      background: #13132e;
      border-radius: 12px;
      margin-top: 8px;
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 360px;
      padding: 18px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      border: none;
      margin-bottom: 12px;
    }
    .btn-primary {
      background: #c9a96e;
      color: #07071a;
    }
    .btn-secondary {
      background: #13132e;
      color: #c9a96e;
      border: 1px solid #c9a96e;
    }
    .footer {
      color: #2a3a5a;
      font-size: 12px;
      margin-top: 32px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="star">✦</div>
  <div class="app-name">My Star</div>
  <div class="tagline">Gökyüzünde seni bekleyen bir yıldız var</div>

  <div class="card">
    <div class="gift-icon">🎁</div>
    <div class="star-name" id="starName">Yükleniyor...</div>
    <div class="dedication" id="dedication"></div>
    <div class="note" id="note" style="display:none"></div>
  </div>

  <button class="btn btn-primary" id="openApp" onclick="openInApp()">
    Uygulamada Aç ✦
  </button>
  <a class="btn btn-secondary" id="downloadBtn"
    href="https://apps.apple.com/app/mystar/id000000000"
    style="display:none">
    App Store'dan İndir
  </a>

  <div class="footer">
    My Star · Gökyüzündeki yıldızlarını sahiplen
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = decodeURIComponent(params.get('name') || 'Yıldızın');
    const az = params.get('az') || '0';
    const alt = params.get('alt') || '0';
    const ded = decodeURIComponent(params.get('ded') || '');
    const note = decodeURIComponent(params.get('note') || '');

    document.getElementById('starName').textContent = name;
    if (ded) {
      document.getElementById('dedication').textContent = '💫 ' + ded;
    }
    if (note) {
      const noteEl = document.getElementById('note');
      noteEl.textContent = '"' + note + '"';
      noteEl.style.display = 'block';
    }

    // Deep link URL
    const deepLink = `mystar://find?name=${encodeURIComponent(name)}&az=${az}&alt=${alt}&ded=${encodeURIComponent(ded)}&note=${encodeURIComponent(note)}`;

    function openInApp() {
      // Uygulamayı açmayı dene
      window.location.href = deepLink;

      // 2 saniye sonra uygulama açılmadıysa App Store'u göster
      setTimeout(() => {
        document.getElementById('downloadBtn').style.display = 'block';
        document.getElementById('openApp').textContent = 'Tekrar Dene ✦';
      }, 2000);
    }

    // Sayfa açılınca otomatik dene
    setTimeout(() => {
      openInApp();
    }, 800);
  </script>
</body>
</html>
