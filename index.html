<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Star — Bir Yıldız Seni Bekliyor</title>
  <meta property="og:title" content="My Star — Bir Yıldız Seni Bekliyor" />
  <meta property="og:description" content="Gökyüzünde seni bekleyen bir yıldız var." />
  <meta property="og:image" content="https://getmystar.app/og.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #07071a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .star { font-size: 64px; margin-bottom: 16px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .app-name { color: #c9a96e; font-size: 28px; font-weight: 800; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 8px; }
    .tagline { color: #3a4a6a; font-size: 14px; margin-bottom: 40px; text-align: center; }
    .card {
      background: #0d0d24; border: 1px solid #c9a96e;
      border-radius: 24px; padding: 28px 24px;
      width: 100%; max-width: 360px; text-align: center; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .gift-icon { font-size: 36px; margin-bottom: 12px; }
    .star-name { color: #c9a96e; font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .dedication { color: rgba(200,180,255,0.7); font-size: 14px; margin-bottom: 12px; }
    .note { color: #6b8aad; font-size: 14px; font-style: italic; line-height: 1.6; padding: 12px 16px; background: #13132e; border-radius: 12px; margin-top: 8px; }
    .btn { display: block; width: 100%; max-width: 360px; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; text-decoration: none; text-align: center; cursor: pointer; border: none; margin-bottom: 12px; }
    .btn-primary { background: #c9a96e; color: #07071a; }
    .btn-secondary { background: #13132e; color: #c9a96e; border: 1px solid #c9a96e; }
    .footer { color: #2a3a5a; font-size: 12px; margin-top: 32px; text-align: center; }
    #status { color: #4a6a8a; font-size: 13px; margin-bottom: 16px; text-align: center; min-height: 20px; }
  </style>
</head>
<body>
  <div class="star">✦</div>
  <div class="app-name">My Star</div>
  <div class="tagline">Gökyüzünde seni bekleyen bir yıldız var</div>

  <div class="card">
    <div class="gift-icon">🎁</div>
    <div class="star-name" id="starName">Yükleniyor...</div>
    <div class="dedication" id="dedication"></div>
    <div class="note" id="note" style="display:none"></div>
  </div>

  <div id="status">Uygulama açılıyor...</div>

  <button class="btn btn-primary" id="openBtn" onclick="openInApp()">
    Uygulamada Aç ✦
  </button>
  <a class="btn btn-secondary" id="downloadBtn"
    href="https://apps.apple.com/app/id000000000"
    style="display:none">
    App Store'dan İndir
  </a>

  <div class="footer">getmystar.app · Gökyüzündeki yıldızlarını sahiplen</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const name = decodeURIComponent(params.get('name') || 'Yıldızın');
    const az = params.get('az') || '0';
    const alt = params.get('alt') || '0';
    const ded = decodeURIComponent(params.get('ded') || '');
    const note = decodeURIComponent(params.get('note') || '');
    const ra = params.get('ra') || '';
    const dec = params.get('dec') || '';

    document.getElementById('starName').textContent = name;
    if (ded) document.getElementById('dedication').textContent = '💫 ' + ded;
    if (note) {
      const el = document.getElementById('note');
      el.textContent = '"' + note + '"';
      el.style.display = 'block';
    }

    const deepLink = 'mystar://find?name=' + encodeURIComponent(name) +
      '&az=' + az + '&alt=' + alt +
      '&ded=' + encodeURIComponent(ded) +
      '&note=' + encodeURIComponent(note) +
      '&ra=' + ra + '&dec=' + dec;

    let appOpened = false;

    function openInApp() {
      document.getElementById('status').textContent = 'Uygulama açılıyor...';
      window.location.href = deepLink;
      setTimeout(() => {
        if (!appOpened) {
          document.getElementById('status').textContent = 'Uygulama bulunamadı. App Store\'dan indir:';
          document.getElementById('downloadBtn').style.display = 'block';
          document.getElementById('openBtn').textContent = 'Tekrar Dene ✦';
        }
      }, 2500);
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        appOpened = true;
        document.getElementById('status').textContent = '✦ Uygulama açıldı!';
      }
    });

    setTimeout(openInApp, 600);
  </script>
</body>
</html>
